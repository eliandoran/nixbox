name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: build, vet & test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Cache /nix/store (go toolchain, pam, esbuild) in GitHub's Actions
      # cache so runs don't re-download from cache.nixos.org. The key is
      # per-job: the devShell and the package build have different, only
      # partly-overlapping closures, and GitHub cache keys are immutable —
      # a shared key lets whichever job finishes first win and forces the
      # other to re-fetch its own paths every run.
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-devshell-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-devshell-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-devshell-
          purge-created: 0
          purge-primary-key: never

      # cache-nix-action only covers /nix/store; the devShell's live
      # `go build`/`go test` still downloads modules into GOMODCACHE and
      # writes GOCACHE. Cache both (default ~/go/pkg/mod + ~/.cache/go-build)
      # keyed on go.sum, prefix-restored so the build cache survives dep
      # bumps. (The package job's Go deps are already the vendored FOD in
      # /nix/store, so it needs none of this.)
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      # Run the Go checks inside the devShell: it already carries the go
      # toolchain, esbuild, libpam (the PAM backend is cgo) and
      # NIXBOX_PAM_TEST_MODULES for the real-PAM tests — so CI needs no
      # ubuntu-specific apt/npx setup maintained alongside the nix build.

      # web/static/app.js is a gitignored esbuild product; bundle it first
      # (same `just bundle` invocation as the nix preBuild) or the go:embed
      # in web/embed.go has no match.
      - name: bundle web assets
        run: nix develop --command just bundle

      - name: build
        run: nix develop --command go build ./...

      - name: vet
        run: nix develop --command go vet ./...

      - name: test
        run: nix develop --command go test ./...

  nix:
    name: package (nix build .#nixbox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Per-job key (see the devShell job's note): caching the package
      # build's full closure means a repeat run restores the built output
      # path too, so `nix build` is a no-op instead of a ~50s recompile.
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-package-${{ hashFiles('**/*.nix', 'flake.lock', 'go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-package-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-package-
          purge-created: 0
          purge-primary-key: never

      - name: build package
        run: nix build .#nixbox --print-build-logs
