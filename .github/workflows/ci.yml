name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: build, vet & test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Cache /nix/store (go toolchain, pam, esbuild, the vendored-Go FOD)
      # in GitHub's Actions cache, keyed on the nix inputs, so runs don't
      # re-download from cache.nixos.org. Prefix-matched, so this job and
      # the package job warm each other.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Run the Go checks inside the devShell: it already carries the go
      # toolchain, esbuild, libpam (the PAM backend is cgo) and
      # NIXBOX_PAM_TEST_MODULES for the real-PAM tests — so CI needs no
      # ubuntu-specific apt/npx setup maintained alongside the nix build.

      # web/static/app.js is a gitignored esbuild product; bundle it first
      # (same `just bundle` invocation as the nix preBuild) or the go:embed
      # in web/embed.go has no match.
      - name: bundle web assets
        run: nix develop --command just bundle

      - name: build
        run: nix develop --command go build ./...

      - name: vet
        run: nix develop --command go vet ./...

      - name: test
        run: nix develop --command go test ./...

  nix:
    name: package (nix build .#nixbox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: build package
        run: nix build .#nixbox --print-build-logs
