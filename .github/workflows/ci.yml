name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: build, vet & test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The PAM auth backend is cgo and needs libpam's headers to compile
      # (build/vet/test all fail without them, same as the devShell note).
      # Also point the real-PAM tests at the system pam_permit/pam_deny
      # modules — located dynamically so a multiarch path change can't
      # silently downgrade them to a skip — mirroring NIXBOX_PAM_TEST_MODULES
      # from the devShell.
      - name: install libpam (cgo PAM backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev
          echo "NIXBOX_PAM_TEST_MODULES=$(dirname "$(dpkg -L libpam-modules | grep -m1 /pam_permit.so)")" >> "$GITHUB_ENV"

      # web/static/app.js is a gitignored esbuild product, so a fresh
      # checkout lacks it and the go:embed in web/embed.go fails to build.
      # Bundle it first, same invocation as `just bundle` / the nix preBuild.
      # esbuild is pinned to the ^0.24.0 the web/editor bundle uses.
      - name: bundle web assets
        run: npx --yes esbuild@0.24 web/src/main.ts --bundle --format=iife --outfile=web/static/app.js

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

  nix:
    name: package (nix build .#nixbox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: build package
        run: nix build .#nixbox --print-build-logs
