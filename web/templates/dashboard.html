{{define "content"}}
<section class="cards">
  <div class="card host-card">
    <h2>Host</h2>
    <dl>
      <dt>Hostname</dt><dd>{{.Host.Hostname}}</dd>
      <dt>NixOS</dt><dd>{{.Host.OSVersion}}</dd>
      <dt>Generation</dt><dd>{{if .Host.Generation}}{{.Host.Generation}}{{else}}—{{end}}</dd>
      <dt>State dir</dt><dd><code>{{.Host.StateDir}}</code></dd>
    </dl>
  </div>
</section>
{{end}}
