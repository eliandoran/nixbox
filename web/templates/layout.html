{{define "layout"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · nixbox</title>
  <script>
    var theme = localStorage.getItem("nixbox-theme");
    if (theme === "light" || theme === "dark") document.documentElement.dataset.theme = theme;
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">nix<span>box</span></a>
    <nav>
      <a href="/" {{if eq .Nav "dashboard"}}class="active"{{end}}>Dashboard</a>
      <a href="/system" {{if eq .Nav "system"}}class="active"{{end}}>System</a>
    </nav>
    <button class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <div class="host-badge">{{.HostAttr}}</div>
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>{{end}}

{{define "job-log"}}
<div class="card log-card">
  <div class="log-head">
    <strong>Job #{{.ID}}</strong> — {{.Kind}}
    <span class="status status-{{.Status}}" id="job-status">{{.Status}}</span>
  </div>
  <pre class="log" id="job-log" data-job-id="{{.ID}}" data-live="{{if eq .Status "running"}}1{{end}}"></pre>
</div>
<script>watchJob();</script>
{{end}}
