{{define "content"}}
<section class="terminal-section">
  <div class="section-head">
    <h2>{{T "nav.terminal"}}</h2>
    <span class="hint">{{T "term.hint"}}</span>
  </div>
  {{if .Enabled}}
  <link rel="stylesheet" href="/static/xterm.css">
  <div id="terminal" class="terminal" data-terminal-ws="/terminal/ws"></div>
  <script src="/static/xterm.js" defer></script>
  {{else}}
  <div class="banner">{{T "term.disabled-1"}} <code>NIXBOX_TERMINAL=1</code>
  {{T "term.disabled-2"}}</div>
  {{end}}
</section>
{{end}}
